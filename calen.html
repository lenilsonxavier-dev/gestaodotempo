<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão do Tempo - Professor Leno</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --cor-htp: #add8e6;
            --cor-mes-atual: #90ee90;
            --cor-feriado: #ff4500;
            --cor-conselho: #b39ddb;
            --cor-recesso: #ffb300;
            --cor-parada: #ff8c00;
            --cor-formacao: #000000;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .calendario-wrapper {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* BARRA SUPERIOR (IMAGEM 2) */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            gap: 15px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }
        .search-container { flex-grow: 1; }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid #dfe1e5;
        }
        .btn-pdf {
            background: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* CABEÇALHO (IMAGEM 4) */
        .header-osasco {
            background: #0a2f6c;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .header-osasco h1 { font-size: 2.2rem; margin: 0; }
        .header-osasco h2 { color: #ffb300; margin: 5px 0; }
        .unidade-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            padding: 8px;
            width: 70%;
            margin: 10px auto 0;
            font-weight: bold;
        }

        /* NAVEGAÇÃO */
        .nav-mes {
            background: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            color: white;
        }
        .nav-btn { background: #f1c40f; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .mes-titulo { background: #1e2f3e; padding: 5px 25px; border-radius: 20px; font-weight: bold; font-size: 1.4rem; }

        /* GRADE FIXA (NÃO EXPANDE) */
        .grade-table { 
            width: 100%; 
            border-collapse: collapse; 
            table-layout: fixed; /* Força as colunas a terem tamanho fixo */
        }
        .grade-table th { background: #cfd8dc; padding: 10px; border: 1px solid #b0bec5; }
        .grade-table td { 
            border: 1px solid #b0bec5; 
            height: 120px; /* Altura fixa */
            max-height: 120px;
            vertical-align: top; 
            overflow: hidden; /* Impede a expansão visual */
            background: white;
        }
        
        .day-number { font-weight: bold; font-size: 1.1rem; padding: 5px 10px; background: rgba(0,0,0,0.05); display: inline-block; }
        
        /* FONTE MAIOR E ROLAGEM INTERNA SE O TEXTO FOR LONGO */
        .agenda-text { 
            font-size: 14px; /* Tamanho solicitado */
            padding: 8px; 
            height: 85px; 
            outline: none; 
            overflow-y: auto; /* Se o texto for muito grande, cria uma barra interna e não deforma a célula */
            word-wrap: break-word;
        }

        /* BORDAS DINÂMICAS */
        .borda-htp { border: 4px solid var(--cor-htp) !important; }
        .borda-feriado { border: 4px solid var(--cor-feriado) !important; }
        .borda-conselho { border: 4px solid var(--cor-conselho) !important; }
        .borda-recesso { border: 4px solid var(--cor-recesso) !important; }
        .borda-parada { border: 4px solid var(--cor-parada) !important; }
        .borda-formacao { border: 4px solid var(--cor-formacao) !important; }

        .domingo-bg { background: #fff5f5 !important; }
        .sabado-bg { background: #f5f8ff !important; }
        .htp-bg { background: #f0faff !important; }

        /* BARRA DE STATUS (IMAGEM 3) */
        .status-bar {
            padding: 20px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #eee;
        }
        .card-status {
            background: #fff;
            padding: 10px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
        .badge-nuvem { background: #d4edda; color: #155724; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .btn-status { border: none; padding: 10px 20px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; }
        .btn-som { background: #e67e22; }
        .btn-reset { background: #34495e; }

        .legendas-dots { display: flex; justify-content: center; gap: 15px; padding: 10px; font-size: 12px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }

        @media print { .top-bar, .nav-mes, .status-bar, .legendas-dots { display: none; } }
    </style>
</head>
<body>

<div class="calendario-wrapper">
    <div class="top-bar">
        <div class="search-container"><input type="text" placeholder="🔍 Localizar Professor..."></div>
        <button class="btn-pdf" onclick="window.print()">📑 PDF</button>
    </div>

    <div class="header-osasco">
        <div style="font-size: 0.8rem; letter-spacing: 2px;">PREFEITURA DE</div>
        <h1>OSASCO</h1>
        <h2>Gestão do Tempo</h2>
        <div class="unidade-box" contenteditable="true">PROFESSOR LENO - E.M. QUINTINO BOCAIUVA</div>
    </div>

    <div class="nav-mes">
        <button class="nav-btn" onclick="mudarMes(-1)">◀</button>
        <div class="mes-titulo" id="mesTitle">ABRIL 2026</div>
        <button class="nav-btn" onclick="mudarMes(1)">▶</button>
    </div>

    <table class="grade-table">
        <thead><tr id="weekRow"></tr></thead>
        <tbody id="calendarBody"></tbody>
    </table>

    <div class="legendas-dots">
        <span><span class="dot" style="background:var(--cor-htp)"></span> HTP</span>
        <span><span class="dot" style="background:var(--cor-feriado)"></span> Feriado</span>
        <span><span class="dot" style="background:var(--cor-conselho)"></span> Conselho</span>
        <span><span class="dot" style="background:var(--cor-recesso)"></span> Recesso</span>
        <span><span class="dot" style="background:var(--cor-parada)"></span> Parada</span>
        <span><span class="dot" style="background:var(--cor-formacao)"></span> Formação</span>
    </div>

    <div class="status-bar">
        <div class="card-status">
            <strong>⏰ STATUS:</strong>
            <span class="badge-nuvem" id="statusFirebase">Dados Recuperados</span>
            <button class="btn-status btn-som" onclick="testarSom()">🔊 Testar Som</button>
            <button class="btn-status btn-reset" onclick="resetarMes()">🗑️ Resetar</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjs0Emwh1Eyqf7pXYEJt9MBfY0Ga8ZJBc",
        authDomain: "gestao-de-tempo-d4319.firebaseapp.com",
        databaseURL: "https://gestao-de-tempo-d4319-default-rtdb.firebaseio.com",
        projectId: "gestao-de-tempo-d4319",
        appId: "1:1074574504996:web:87e81456b1460e03a4d4b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const calRef = ref(db, 'calendario_escolar_dados');

    onValue(calRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.eventos) {
            window.agendaStorage = new Map(Object.entries(data.eventos));
            document.getElementById('statusFirebase').innerText = "✅ Sincronizado";
        }
        renderCalendar(window.anoAtual, window.mesAtual);
    });

    window.saveToFirebase = () => {
        const obj = Object.fromEntries(window.agendaStorage);
        set(calRef, { eventos: obj, lastUpdate: new Date().toISOString() });
    };
</script>

<script>
    window.anoAtual = 2026;
    window.mesAtual = 3;
    window.agendaStorage = new Map();

    function aplicarCores(td, texto) {
        const t = texto.toUpperCase();
        td.classList.remove('borda-htp','borda-feriado','borda-conselho','borda-recesso','borda-parada','borda-formacao');
        if(t.includes("HTP")) td.classList.add("borda-htp");
        if(t.includes("FERIADO")) td.classList.add("borda-feriado");
        if(t.includes("CONSELHO") || t.includes("REUNIÃO")) td.classList.add("borda-conselho");
        if(t.includes("RECESSO")) td.classList.add("borda-recesso");
        if(t.includes("PARADA")) td.classList.add("borda-parada");
        if(t.includes("FORMAÇÃO") || t.includes("FORMACAO")) td.classList.add("borda-formacao");
    }

    function renderCalendar(ano, mes) {
        const tbody = document.getElementById("calendarBody");
        tbody.innerHTML = "";
        document.getElementById("mesTitle").innerText = `${["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"][mes]} ${ano}`;
        
        const primeiroDia = new Date(ano, mes, 1).getDay();
        const diasNoMes = new Date(ano, mes + 1, 0).getDate();
        
        let linha = document.createElement("tr");
        for(let i=0; i<primeiroDia; i++) linha.appendChild(document.createElement("td")).style.background = "#f9f9f9";

        for(let d=1; d<=diasNoMes; d++) {
            const key = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const wd = new Date(ano, mes, d).getDay();
            const td = document.createElement("td");
            
            if(wd === 0) td.className = "domingo-bg";
            if(wd === 6) td.className = "sabado-bg";
            if(wd === 2 || wd === 4) td.className = "htp-bg";

            const texto = window.agendaStorage.get(key) || "";
            aplicarCores(td, texto);

            td.innerHTML = `<div class="day-number">${d}</div><div class="agenda-text" contenteditable="true">${texto}</div>`;
            
            const area = td.querySelector('.agenda-text');
            area.onblur = () => {
                window.agendaStorage.set(key, area.innerText);
                window.saveToFirebase();
                aplicarCores(td, area.innerText);
            };

            linha.appendChild(td);
            if((primeiroDia + d) % 7 === 0) { tbody.appendChild(linha); linha = document.createElement("tr"); }
        }
        tbody.appendChild(linha);
    }

    function testarSom() {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        osc.stop(ctx.currentTime + 0.5);
    }

    function mudarMes(v) { window.mesAtual += v; if(window.mesAtual<0){window.mesAtual=11; window.anoAtual--;} else if(window.mesAtual>11){window.mesAtual=0; window.anoAtual++;} renderCalendar(window.anoAtual, window.mesAtual); }
    
    const hRow = document.getElementById("weekRow");
    ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"].forEach(d => hRow.innerHTML += `<th>${d}</th>`);
    renderCalendar(2026, 3);
</script>
</body>
</html>
