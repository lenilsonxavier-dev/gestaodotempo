<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão do Tempo 2026 | Professor Leno</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --cor-htp: #add8e6;
            --cor-mes-atual: #90ee90;
            --cor-feriado: #ff4500;
            --cor-conselho: #b39ddb;
            --cor-recesso: #ffb300;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .calendario-wrapper {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        /* CABEÇALHO INSTITUCIONAL OSASCO */
        .header-institucional {
            background: linear-gradient(135deg, #0a2f6c 0%, #1b4a8b 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #ffb300;
        }
        .prefeitura { font-size: 0.75rem; letter-spacing: 2px; font-weight: 500; opacity: 0.9; }
        .nome-cidade { font-size: 1.8rem; font-weight: 800; margin: 2px 0; }
        .gestao-tempo h2 {
            font-size: 1.5rem;
            margin: 10px 0 0;
            background: linear-gradient(120deg, #ffb300, #ffdd77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .unidade-editavel input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 6px 15px;
            color: white;
            width: 80%;
            text-align: center;
            margin-top: 10px;
        }

        /* NAVEGAÇÃO */
        .nav-mes {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2c3e50;
            padding: 10px 20px;
            color: white;
        }
        .nav-btn {
            background: #f1c40f;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        /* GRADE */
        .grade-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .grade-table th, .grade-table td {
            border: 1px solid #dee2e6;
            vertical-align: top;
            height: 90px;
            position: relative;
        }
        .grade-table th { background: #f8f9fa; font-size: 0.7rem; height: 30px; }
        
        .day-number {
            font-weight: bold;
            padding: 2px 6px;
            font-size: 0.9rem;
            display: inline-block;
        }
        .agenda-text {
            font-size: 10px;
            padding: 2px 5px;
            height: 60px;
            overflow-y: auto;
            outline: none;
            word-wrap: break-word;
        }

        /* CORES EVENTOS */
        .htp-bg { background-color: var(--cor-htp) !important; }
        .feriado-bg { background-color: var(--cor-feriado) !important; color: white; }
        .conselho-bg { background-color: var(--cor-conselho) !important; }
        .recesso-bg { background-color: var(--cor-recesso) !important; }
        .domingo-bg { background-color: #ffebee; }
        .sabado-bg { background-color: #e3f2fd; }

        .notif-badge { position: absolute; top: 2px; right: 2px; font-size: 10px; }

        .legenda-painel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            font-size: 10px;
            justify-content: center;
            border-top: 1px solid #ddd;
        }

        .btn-acao {
            background: #2c3e50; color: white; border: none; padding: 5px 12px;
            border-radius: 15px; cursor: pointer; font-size: 11px; margin: 2px;
        }

        @media print { .nav-mes, .btn-acao, .legenda-painel { display: none !important; } }
    </style>
</head>
<body>

<div class="calendario-wrapper">
    <div class="header-institucional">
        <div class="prefeitura">PREFEITURA DE</div>
        <div class="nome-cidade">OSASCO</div>
        <div class="gestao-tempo">
            <h2>Gestão do Tempo</h2>
            <div style="font-size: 0.7rem; opacity: 0.8;">Secretaria de Educação</div>
        </div>
        <div class="unidade-editavel">
            <input type="text" id="unidadeNome" placeholder="NOME DA UNIDADE">
        </div>
    </div>

    <div class="nav-mes">
        <button class="nav-btn" onclick="mudarMes(-1)">◀</button>
        <div id="mesTitle" style="font-weight: bold; font-size: 1.2rem;"></div>
        <button class="nav-btn" onclick="mudarMes(1)">▶</button>
    </div>

    <table class="grade-table">
        <thead><tr id="weekRow"></tr></thead>
        <tbody id="calendarBody"></tbody>
    </table>

    <div class="legenda-painel">
        <span>🔵 HTP (T/Q)</span> <span>🔴 Feriado</span> <span>🟣 Conselho</span> <span>🟡 Recesso</span>
        <button class="btn-acao" onclick="window.print()">🖨️ Imprimir PDF</button>
        <button class="btn-acao" onclick="testarAudio()">🔊 Testar Som</button>
    </div>
</div>

<script>
    let anoAtual = 2026;
    let mesAtual = 3; // Abril
    const mesesNomes = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    const weekDays = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
    
    // Carregar dados salvos ou iniciar vazio
    let agendaStorage = JSON.parse(localStorage.getItem('agenda_leno_2026')) || {};

    const eventosFixos = {
        "3-21": "feriado", "4-1": "feriado", "3-27": "conselho", "3-28": "conselho"
    };

    function mudarMes(delta) {
        mesAtual += delta;
        if(mesAtual > 11) { mesAtual = 0; anoAtual++; }
        if(mesAtual < 0) { mesAtual = 11; anoAtual--; }
        render();
    }

    function salvar(dia, texto) {
        const key = `${anoAtual}-${mesAtual}-${dia}`;
        agendaStorage[key] = texto;
        localStorage.setItem('agenda_leno_2026', JSON.stringify(agendaStorage));
        verificarAlertas(texto, dia);
    }

    function verificarAlertas(texto, dia) {
        const t = texto.toUpperCase();
        if(t.includes("HTPC") || t.includes("REUNIÃO") || t.includes("CONSELHO")) {
            // Se o texto contém palavra-chave, renderiza o badge de sino
            render(); 
        }
    }

    function testarAudio() {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
        setTimeout(() => osc.stop(), 500);
    }

    function render() {
        const tbody = document.getElementById("calendarBody");
        const title = document.getElementById("mesTitle");
        tbody.innerHTML = "";
        title.innerText = `${mesesNomes[mesAtual]} ${anoAtual}`;

        const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
        const diasNoMes = new Date(anoAtual, mesAtual + 1, 0).getDate();

        let data = 1;
        for (let i = 0; i < 6; i++) {
            let row = document.createElement("tr");
            for (let j = 0; j < 7; j++) {
                let cell = document.createElement("td");
                if (i === 0 && j < primeiroDia) {
                    cell.style.background = "#f0f0f0";
                } else if (data > diasNoMes) {
                    cell.style.background = "#f0f0f0";
                } else {
                    const d = data;
                    const key = `${anoAtual}-${mesAtual}-${d}`;
                    const texto = agendaStorage[key] || "";
                    
                    // Lógica de Cores
                    if(j === 0) cell.className = "domingo-bg";
                    if(j === 6) cell.className = "sabado-bg";
                    if(j === 2 || j === 4) cell.classList.add("htp-bg");
                    if(eventosFixos[`${mesAtual}-${d}`]) cell.classList.add(eventosFixos[`${mesAtual}-${d}`] + "-bg");

                    cell.innerHTML = `
                        <div class="day-number">${d}</div>
                        ${texto.toUpperCase().includes("HTPC") || texto.toUpperCase().includes("REUNIÃO") ? '<span class="notif-badge">🔔</span>' : ''}
                        <div class="agenda-text" contenteditable="true" onblur="salvar(${d}, this.innerText)">${texto}</div>
                    `;
                    data++;
                }
                row.appendChild(cell);
            }
            tbody.appendChild(row);
            if (data > diasNoMes) break;
        }
    }

    // Inicialização
    const headerRow = document.getElementById("weekRow");
    weekDays.forEach(d => headerRow.innerHTML += `<th>${d}</th>`);
    
    document.getElementById("unidadeNome").value = localStorage.getItem('unidade_leno') || "E.M. QUINTINO BOCAIUVA";
    document.getElementById("unidadeNome").onblur = (e) => localStorage.setItem('unidade_leno', e.target.value);

    render();
</script>

</body>
</html>
