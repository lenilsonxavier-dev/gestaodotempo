<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Gestão do Tempo - Calendário Escolar 2026 | Professor Leno</title>
    <style>
        * { box-sizing: border-box; }
        :root {
            --cor-htp: #add8e6;
            --cor-mes-atual: #90ee90;
            --cor-feriado: #ff4500;
            --cor-conselho: #b39ddb;
            --cor-recesso: #ffb300;
            --alerta-bg: #fff3cd;
        }
        body {
            font-family: 'Segoe UI', 'Arial Narrow', Arial, sans-serif;
            background: #eef2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .calendario-wrapper {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header-institucional {
            background: linear-gradient(135deg, #0a2f6c 0%, #1b4a8b 100%);
            color: white;
            padding: 25px 20px 20px 20px;
            text-align: center;
            border-bottom: 5px solid #ffb300;
        }
        .prefeitura { font-size: 0.85rem; letter-spacing: 2px; font-weight: 500; opacity: 0.9; }
        .nome-cidade { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin: 5px 0 0; letter-spacing: -0.5px; }
        .slogan { font-size: 0.85rem; font-style: italic; font-weight: 300; margin-top: 5px; }
        .gestao-tempo { margin-top: 12px; }
        .gestao-tempo h2 {
            font-size: 1.8rem;
            margin: 0;
            font-weight: 700;
            background: linear-gradient(120deg, #ffb300, #ffdd77);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .secretaria { font-size: 0.8rem; font-weight: 500; margin-top: 4px; letter-spacing: 1px; }
        .divisor-ouro { height: 2px; background: linear-gradient(90deg, transparent, #ffb300, #ffdd77, #ffb300, transparent); width: 60%; margin: 12px auto 0; }
        .unidade-editavel { margin-top: 14px; }
        .unidade-editavel input {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: bold;
            width: 60%;
            text-align: center;
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }
        .nav-mes { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; padding: 8px 25px; color: white; }
        .nav-btn { background: #f1c40f; border: none; font-size: 1.6rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover { background: #e67e22; transform: scale(1.03);}
        .mes-ano-titulo { font-size: 1.6rem; font-weight: bold; background: #1e2f3e; padding: 5px 20px; border-radius: 40px; }
        .grade-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .grade-table th, .grade-table td { border: 1px solid #b0bec5; vertical-align: top; height: 100px; width: 12%; background-color: white; }
        .grade-table th { background: #cfd8dc; font-size: 0.85rem; height: 32px; }
        .cell-day { display: flex; flex-direction: column; height: 100%; position: relative; }
        .day-number { font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.05); width: 28px; text-align: center; border-radius: 20px; margin: 4px; }
        .agenda-text { font-size: 10px; line-height: 1.3; padding: 6px 4px; min-height: 65px; overflow-y: auto; outline: none; cursor: text; border-radius: 6px; background: #fef9e6; transition: 0.1s; }
        .agenda-text:focus { background: #fff3c9; box-shadow: inset 0 0 0 2px #f39c12; }
        .notif-badge { position: absolute; bottom: 2px; left: 4px; font-size: 9px; background: #e74c3c; color: white; border-radius: 20px; padding: 1px 5px; font-weight: bold; pointer-events: none; }
        .htp-bg { background-color: var(--cor-htp) !important; }
        .mes-destaque { background-color: var(--cor-mes-atual) !important; }
        .feriado-bg { background-color: var(--cor-feriado) !important; color: white; }
        .conselho-bg { background-color: var(--cor-conselho) !important; }
        .recesso-bg { background-color: var(--cor-recesso) !important; }
        .domingo-bg { background-color: #f8e8e8 !important; }
        .sabado-bg { background-color: #e8f0fe !important; }
        .legenda-painel { display: flex; flex-wrap: wrap; gap: 15px; background: #f4f6f9; padding: 8px 20px; border-top: 1px solid #ccc; font-size: 11px; justify-content: center; }
        .info-panel { background: #e9ecef; padding: 12px 20px; text-align: center; border-top: 2px solid #cbd5e0; }
        .card-config { background: white; border-radius: 20px; padding: 8px 16px; display: inline-block; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .btn-acao { background: #2c3e50; color: white; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-weight: bold; margin: 3px; }
        .btn-alarme { background: #e67e22; }
        .notif-info { background: #d4edda; border-radius: 16px; padding: 6px 12px; font-size: 11px; display: inline-block; margin-left: 15px; }
        @media print { .nav-mes, .btn-acao, .info-panel .btn-acao, .legenda-painel .btn-acao { display: none; } }
    </style>
</head>
<body>

<div class="calendario-wrapper">
    <div class="header-institucional">
        <div class="prefeitura">PREFEITURA DE</div>
        <div class="nome-cidade">OSASCO</div>
        <div class="slogan">CIDADE DA FAMÍLIA E QUE ABRAÇA</div>
        <div class="gestao-tempo">
            <h2>Gestão do Tempo</h2>
            <div class="secretaria">Secretaria de Educação</div>
        </div>
        <div class="divisor-ouro"></div>
        <div class="unidade-editavel">
            <input type="text" id="unidadeNome" value="PROFESSOR LENO - E.M. QUINTINO BOCAIUVA" placeholder="NOME DA UNIDADE EDUCACIONAL">
        </div>
    </div>

    <div class="nav-mes">
        <button class="nav-btn" id="btnPrev">◀</button>
        <div class="mes-ano-titulo" id="mesTitle">ABRIL 2026</div>
        <button class="nav-btn" id="btnNext">▶</button>
    </div>

    <table class="grade-table" id="calendarGrid">
        <thead><tr id="weekRow"></tr></thead>
        <tbody id="calendarBody"></tbody>
    </table>

    <div class="legenda-painel">
        <span>🔵 HTP (Ter/Qui)</span> <span>🟢 Mês atual</span> <span>🔴 Feriado</span> 
        <span>🟣 Conselho/Reunião</span> <span>🟡 Recesso</span>
    </div>

    <div class="info-panel">
        <div class="card-config">
            <strong>⏰ STATUS DA NUVEM:</strong>
            <div class="notif-info" id="statusFirebase">Iniciando...</div>
            <button class="btn-acao btn-alarme" id="testNotifBtn">🔊 Testar Som</button>
            <button class="btn-acao" onclick="window.print()">🖨️ Imprimir</button>
            <button class="btn-acao" id="resetAgendaMesBtn">🗑️ Resetar Mês</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjs0Emwh1Eyqf7pXYEJt9MBfY0Ga8ZJBc",
        authDomain: "gestao-de-tempo-d4319.firebaseapp.com",
        databaseURL: "https://gestao-de-tempo-d4319-default-rtdb.firebaseio.com",
        projectId: "gestao-de-tempo-d4319",
        storageBucket: "gestao-de-tempo-d4319.appspot.com",
        messagingSenderId: "1074574504996",
        appId: "1:1074574504996:web:87e81456b1460e03a4d4b1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const calRef = ref(db, 'calendario_escolar_dados');

    // Monitoramento em tempo real
    onValue(calRef, (snapshot) => {
        const data = snapshot.val();
        const statusEl = document.getElementById('statusFirebase');
        
        if (data && data.eventos) {
            // Só atualiza se houver dados reais para não sobrescrever com vazio em caso de erro
            window.agendaStorage = new Map(Object.entries(data.eventos));
            statusEl.innerText = "✅ Dados Recuperados";
            statusEl.style.background = "#d4edda";
        } else {
            statusEl.innerText = "⚠️ Sem dados na nuvem";
            statusEl.style.background = "#f8d7da";
        }
        window.renderCalendar(window.anoAtual, window.mesAtual);
    }, (error) => {
        console.error("Erro Firebase:", error);
        document.getElementById('statusFirebase').innerText = "❌ Erro de Conexão";
    });

    window.saveToFirebase = function() {
        const obj = Object.fromEntries(window.agendaStorage);
        set(calRef, { 
            eventos: obj, 
            lastUpdate: new Date().toISOString() 
        }).then(() => {
            document.getElementById('statusFirebase').innerText = "✅ Salvo agora";
        });
    };
</script>

<script>
    // Lógica do Calendário
    window.anoAtual = 2026;
    window.mesAtual = 3;
    window.agendaStorage = new Map();
    const weekDays = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SAB"];
    const mesesNomes = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    
    const eventosFixos = new Map();
    ["4-21","10-15","4-1","8-7","11-25","0-1"].forEach(f => eventosFixos.set(f, "feriado"));
    eventosFixos.set("3-27","conselho"); eventosFixos.set("3-28","conselho");
    eventosFixos.set("2-15","conselho"); eventosFixos.set("6-10","conselho");
    eventosFixos.set("0-25","recesso");

    function playBeep(f=880, d=0.3) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = f; g.gain.value = 0.2;
            osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + d);
            osc.stop(ctx.currentTime + d);
        } catch(e) {}
    }

    window.renderCalendar = function(year, month) {
        const tbody = document.getElementById("calendarBody");
        if (!tbody) return;
        tbody.innerHTML = "";
        const first = new Date(year, month, 1).getDay();
        const total = new Date(year, month+1, 0).getDate();
        let row = document.createElement("tr");
        
        for(let i=0; i<first; i++) row.appendChild(document.createElement("td")).style.background = "#f1f3f5";
        
        for(let d=1; d<=total; d++) {
            const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const wd = new Date(year, month, d).getDay();
            const td = document.createElement("td");
            
            if (wd === 2 || wd === 4) td.className = "htp-bg";
            if (wd === 0) td.className = "domingo-bg";
            if (wd === 6) td.className = "sabado-bg";
            if (eventosFixos.has(`${month}-${d}`)) td.className = eventosFixos.get(`${month}-${d}`) + "-bg";

            const cell = document.createElement("div");
            cell.className = "cell-day";
            cell.innerHTML = `<div class="day-number">${d}</div>`;
            
            const area = document.createElement("div");
            area.className = "agenda-text";
            area.contentEditable = true;
            area.innerText = window.agendaStorage.get(key) || "";
            
            area.onblur = () => {
                const val = area.innerText.trim();
                window.agendaStorage.set(key, val);
                if(window.saveToFirebase) window.saveToFirebase();
            };
            
            cell.appendChild(area);
            td.appendChild(cell);
            row.appendChild(td);
            if ((first + d) % 7 === 0) { tbody.appendChild(row); row = document.createElement("tr"); }
        }
        tbody.appendChild(row);
        document.getElementById("mesTitle").innerText = `${mesesNomes[month]} ${year}`;
    };

    document.getElementById("btnPrev").onclick = () => { window.mesAtual--; if(window.mesAtual<0){window.mesAtual=11; window.anoAtual--;} window.renderCalendar(window.anoAtual, window.mesAtual); };
    document.getElementById("btnNext").onclick = () => { window.mesAtual++; if(window.mesAtual>11){window.mesAtual=0; window.anoAtual++;} window.renderCalendar(window.anoAtual, window.mesAtual); };
    document.getElementById("testNotifBtn").onclick = () => playBeep(1000, 0.5);
    document.getElementById("resetAgendaMesBtn").onclick = () => { if(confirm("Limpar este mês?")) { 
        const total = new Date(window.anoAtual, window.mesAtual+1, 0).getDate();
        for(let i=1; i<=total; i++) {
            const key = `${window.anoAtual}-${String(window.mesAtual+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            window.agendaStorage.delete(key);
        }
        if(window.saveToFirebase) window.saveToFirebase(); 
        window.renderCalendar(window.anoAtual, window.mesAtual); 
    }};

    // Inicialização Manual
    const headerRow = document.getElementById("weekRow");
    weekDays.forEach(day => headerRow.appendChild(document.createElement("th")).innerText = day);
    window.renderCalendar(window.anoAtual, window.mesAtual);
</script>
</body>
</html>
