<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão 2026 · Professor Leno</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #eef2f8; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        /* HEADER */
        .header-institucional { width: 100%; max-width: 1400px; margin: 0 auto 15px; display: flex; justify-content: center; background: white; padding: 10px; border-radius: 15px; flex-direction: column; align-items: center; border-bottom: 4px solid #1e3a5f; }
        .editable-prefeitura { font-size: 1.4rem; font-weight: bold; color: #1e3a5f; }
        .editable-gestao { font-size: 2rem; font-weight: bold; color: #1e3a5f; margin: 5px 0; }
        .editable-header { width: 100%; max-width: 1200px; margin-top: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; background: #f0f7ff; padding: 12px; border-radius: 10px; border: 2px solid #1e3a5f; outline: none; }

        /* CONTAINER PRINCIPAL */
        .main-container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
        .search-input { flex-grow: 1; padding: 12px 20px; border-radius: 40px; border: 2px solid #cbd5e1; outline: none; min-width: 200px; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 0.9rem; }
        .btn-navy { background: #1e3a5f; }
        .btn-green { background: #22c55e; }
        .btn-orange { background: #f59e0b; }
        .btn-red { background: #ef4444; }

        /* GRADE DE HORÁRIOS */
        .grid-wrapper { width: 100%; overflow-x: auto; border: 1px solid #cbd5e1; border-radius: 10px; }
        .schedule-grid { display: grid; background: white; font-size: 0.75rem; }
        .grid-header, .time-slot { background: #f8fafc; font-weight: bold; text-align: center; padding: 8px; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .schedule-cell { border-bottom: 0.5px solid #e2e8f0; border-right: 0.5px solid #e2e8f0; padding: 8px; min-height: 80px; text-align: center; display: flex; flex-direction: column; justify-content: center; cursor: pointer; }

        /* CORES CÉLULAS */
        .cell-leno { background-color: rgba(30, 58, 95, 0.2) !important; border: 2px solid #1e3a5f !important; font-weight: bold; }
        .cell-hi { background-color: rgba(255, 255, 0, 0.3) !important; border-left: 5px solid #eab308 !important; }
        .cell-hl { background-color: rgba(239, 68, 68, 0.2) !important; border-left: 5px solid #ef4444 !important; }

        /* TABS */
        .tabs-row { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; align-items: center; }
        .tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .tab.active { background: #1e3a5f; color: white; }

        /* MODAL CALENDÁRIO */
        #calendarModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; padding: 20px; }
        .modal-content { background: white; width: 100%; height: 100%; border-radius: 20px; overflow: hidden; position: relative; }
        .close-calendar { position: absolute; top: 15px; right: 20px; background: #ef4444; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 4001; }

        /* TOAST */
        .alarm-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e3a5f; color: white; padding: 15px 30px; border-radius: 50px; z-index: 10001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; animation: popUp 0.5s ease; }
        @keyframes popUp { from { bottom: -50px; } to { bottom: 20px; } }
        
        #audioUnlock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 58, 95, 0.98); z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 20px; }
        #audioUnlock button { padding: 20px 40px; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: #22c55e; color: white; font-weight: bold; }
    </style>
</head>
<body>

<!-- BLOQUEIO DE ÁUDIO -->
<div id="audioUnlock">
    <div style="font-size: 4rem; margin-bottom: 20px;">🔔</div>
    <h2>Sistema Professor Leno 2026</h2>
    <p>Ative os alarmes e integre com o WhatsApp clicando abaixo.</p>
    <button onclick="ativarSons()">ATIVAR SISTEMA AGORA</button>
</div>

<!-- MODAL CALENDÁRIO -->
<div id="calendarModal">
    <button class="close-calendar" onclick="document.getElementById('calendarModal').style.display='none'">✕</button>
    <div class="modal-content">
        <iframe id="calFrame" src="about:blank" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div class="header-institucional">
    <div class="editable-prefeitura">PREFEITURA DE OSASCO</div>
    <div class="editable-gestao">Gestão do Tempo</div>
    <div class="editable-header">PROFESSOR LENO - E.M. QUINTINO BOCAIUVA</div>
</div>

<div class="main-container">
    <div class="toolbar">
        <input type="text" id="teacherSearch" class="search-input" placeholder="🔍 Localizar na grade...">
        <button class="btn btn-green" onclick="compartilharWhatsApp()">🟢 WhatsApp</button>
        <button class="btn btn-navy" onclick="window.tocar('segunda')">🔊 Seg</button>
        <button class="btn btn-navy" onclick="window.tocar('sexta')">🔊 Sex</button>
        <button class="btn btn-red" onclick="window.print()">🖨️ PDF</button>
    </div>
    
    <div class="tabs-row">
        <div id="shiftTabs" style="display:flex; gap:8px;"></div>
        <button class="tab btn-orange" style="color:white" onclick="window.openCalendar()">📅 Calendário Escolar</button>
    </div>
    <div class="tabs-row" id="dayTabs"></div>
    
    <div class="grid-wrapper">
        <div id="scheduleGrid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCjs0Emwh1Eyqf7pXYEJt9MBfY0Ga8ZJBc",
        authDomain: "gestao-de-tempo-d4319.firebaseapp.com",
        databaseURL: "https://gestao-de-tempo-d4319-default-rtdb.firebaseio.com",
        projectId: "gestao-de-tempo-d4319",
        storageBucket: "gestao-de-tempo-d4319.appspot.com",
        messagingSenderId: "1074574504996",
        appId: "1:1074574504996:web:87e81456b1460e03a4d4b1"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- SONS ---
    const somArquivos = {
        atendimento: 'atendim.mp3',
        conselhoHoje: 'conselhohoje.mp3',
        conselhoSemana: 'conselhosemana.mp3',
        hojeforma: 'hojeforma.mp3',
        horadohtpc: 'horadohtpc.mp3',
        htpc5m: 'htpc5m.mp3',
        pais: 'pais.mp3',
        paradapedagogicahoje: 'paradapedagogicahoje.mp3',
        paradasemana: 'paradasemana.mp3',
        reuniagestor: 'reuniagestor.mp3',
        reuniaopaisSemana: encodeURIComponent('reuniãodepaisemana.mp3'),
        segunda: 'segunda.mp3',
        sexta: 'sexta.mp3'
    };

    const player = {};

    window.ativarSons = function() {
        Object.keys(somArquivos).forEach(key => {
            player[key] = new Audio(somArquivos[key]);
            player[key].load();
        });
        document.getElementById('audioUnlock').style.display = 'none';
        showToast("Sistema de Áudio Ativado!");
    };

    window.tocar = function(key) {
        if (player[key]) {
            player[key].play().catch(e => console.log("Erro som:", key));
            showToast("🔊 Testando: " + key);
        }
    };

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'alarm-toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 4000);
    }

    // --- CALENDÁRIO ---
    window.openCalendar = function() {
        const modal = document.getElementById('calendarModal');
        const iframe = document.getElementById('calFrame');
        const calendarRef = ref(db, 'calendario_2026');

        onValue(calendarRef, (snapshot) => {
            const dados = snapshot.val() || { janeiro: ["01/01 - Ano Novo"] };
            const mesesKey = ["janeiro", "fevereiro", "marco", "abril", "maio", "junho", "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];
            
            let html = `<body style="font-family:sans-serif; padding:20px; background:#f0f7ff">
                <h2 style="color:#1e3a5f">📅 Calendário Escolar 2026</h2>
                <button id="saveBtn" style="background:#22c55e; color:white; border:none; padding:10px 20px; border-radius:20px; cursor:pointer; font-weight:bold; margin-bottom:20px;">💾 Salvar Alterações</button>
                <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px;">`;
            
            mesesKey.forEach(mes => {
                const eventos = dados[mes] || [];
                html += `<div style="background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1)">
                    <h4 style="text-transform:capitalize; margin-top:0; color:#1e3a5f">${mes}</h4>
                    <div class="mes-container" data-mes="${mes}" contenteditable="true" style="min-height:80px; outline:none; font-size:0.9rem; line-height:1.4">
                        ${eventos.join('<br>')}
                    </div>
                </div>`;
            });
            html += `</div></body>`;
            
            iframe.srcdoc = html;
            iframe.onload = () => {
                const doc = iframe.contentDocument;
                doc.getElementById('saveBtn').onclick = () => {
                    const novosDados = {};
                    doc.querySelectorAll('.mes-container').forEach(div => {
                        novosDados[div.dataset.mes] = div.innerText.split('\n').filter(t => t.trim() !== "");
                    });
                    set(calendarRef, novosDados).then(() => alert("Calendário salvo no Firebase!"));
                };
            };
        });
        modal.style.display = 'block';
    };

    // --- WHATSAPP ---
    window.compartilharWhatsApp = function() {
        if (!window.config) return;
        const shift = window.config[window.activeShift];
        const dia = window.activeDay;
        const dataDia = shift.data[dia];

        let msg = `🗓️ *HORÁRIO: ${dia.toUpperCase()} (${window.activeShift.toUpperCase()})*\n`;
        msg += `🏫 *E.M. QUINTINO BOCAIUVA*\n\n`;

        shift.aulas.forEach((aula, aIdx) => {
            msg += `*${aula.h} (${aula.l})*\n`;
            shift.turmas.forEach((turma, tIdx) => {
                const cell = dataDia[aIdx][tIdx];
                if (cell.teacher && cell.teacher !== "Livre") {
                    msg += `  • ${turma}: ${cell.teacher} (${cell.room})\n`;
                }
            });
            msg += `\n`;
        });

        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    };

    // --- ALARMES ---
    let checkMinuto = -1;
    function verificarAlarmes() {
        const agora = new Date();
        if (agora.getMinutes() === checkMinuto) return;
        checkMinuto = agora.getMinutes();

        const horaF = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const diaS = agora.getDay();

        if (horaF === "07:05") {
            if (diaS === 1) window.tocar('segunda');
            if (diaS === 5) window.tocar('sexta');
        }

        if (window.config) {
            const shift = window.config[window.activeShift];
            const diaN = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"][diaS];
            if (shift && shift.data && shift.data[diaN]) {
                shift.aulas.forEach((aula, aIdx) => {
                    if (aula.h === horaF) {
                        shift.data[diaN][aIdx].forEach(cel => {
                            const p = (cel.teacher || "").toUpperCase();
                            if (p.includes("HTPC")) window.tocar('horadohtpc');
                            if (p.includes("ATENDIMENTO")) window.tocar('atendimento');
                        });
                    }
                });
            }
        }
    }
    setInterval(verificarAlarmes, 30000);

    // --- DATABASE ---
    onValue(ref(db, 'horarios_quintino'), (snapshot) => {
        const data = snapshot.val();
        if (data && data.config) {
            window.config = data.config;
            window.renderAll();
        }
    });

    // --- INTERFACE ---
    window.activeShift = "manha";
    window.activeDay = "Segunda";
    const DIAS = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];

    window.renderAll = function() {
        if (!window.config) return;
        const shift = window.config[window.activeShift];
        
        document.getElementById("shiftTabs").innerHTML = ["manha", "tarde"].map(s => 
            `<div class="tab ${window.activeShift===s?'active':''}" onclick="window.activeShift='${s}';window.renderAll()">${s.toUpperCase()}</div>`
        ).join("");

        document.getElementById("dayTabs").innerHTML = DIAS.map(d => 
            `<div class="tab ${window.activeDay===d?'active':''}" onclick="window.activeDay='${d}';window.renderAll()">${d}</div>`
        ).join("");

        let html = `<div class="schedule-grid" style="grid-template-columns: 100px repeat(${shift.turmas.length}, minmax(120px, 1fr))">`;
        html += `<div class="grid-header">Horários</div>`;
        shift.turmas.forEach(t => html += `<div class="grid-header">${t}</div>`);
        
        shift.aulas.forEach((aula, aIdx) => {
            html += `<div class="time-slot">${aula.l}<br>${aula.h}</div>`;
            shift.turmas.forEach((_, tIdx) => {
                const cell = shift.data[window.activeDay][aIdx][tIdx];
                const p = cell.teacher || "Livre";
                const pU = p.toUpperCase();
                let cl = "schedule-cell";
                if (pU === "LENO") cl += " cell-leno";
                if (pU.includes("HI")) cl += " cell-hi";
                if (pU.includes("HL")) cl += " cell-hl";
                html += `<div class="${cl}"><strong>${p}</strong><small>${cell.room || "---"}</small></div>`;
            });
        });
        document.getElementById("scheduleGrid").innerHTML = html + `</div>`;
    };
</script>
</body>
</html>
